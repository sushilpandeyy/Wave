services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wave
      POSTGRES_PASSWORD: wave
      POSTGRES_DB: wave
    ports:
      - "5432:5432"
    volumes:
      - wave_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wave"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # One-shot: create schema (tables + indexes). The app services wait for this to finish.
  migrate:
    build: .
    command: ["python", "-m", "scripts.init_db"]
    environment:
      POSTGRES_DSN: postgresql+asyncpg://wave:wave@postgres:5432/wave
    depends_on:
      postgres: {condition: service_healthy}
    restart: "no"

  # Tier-aware load balancer (producer / WebSocket API).
  api:
    build: .
    environment:
      POSTGRES_DSN: postgresql+asyncpg://wave:wave@postgres:5432/wave
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      migrate: {condition: service_completed_successfully}

  # Control plane: the autoscaler. Single replica (Redis-only).
  manager:
    build: .
    command: ["python", "-m", "app.manager"]
    environment:
      REDIS_URL: redis://redis:6379/0
      W_MAX: "32"
    depends_on:
      redis: {condition: service_healthy}

  # Data plane: worker pool. Scale with `docker compose up --scale worker=3`.
  worker:
    build: .
    command: ["python", "-m", "app.worker"]
    environment:
      POSTGRES_DSN: postgresql+asyncpg://wave:wave@postgres:5432/wave
      REDIS_URL: redis://redis:6379/0
      WORKERS_PER_CONTAINER: "16"
      # LLM: read from the project .env (no key -> mock client).
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MODEL_PREMIUM: ${MODEL_PREMIUM:-gpt-4o}
      MODEL_STANDARD: ${MODEL_STANDARD:-gpt-4o-mini}
      MODEL_FAST: ${MODEL_FAST:-gpt-4o-mini}
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      migrate: {condition: service_completed_successfully}

  # Reflection plane: close idle sessions + evolve user personalities (background).
  reflector:
    build: .
    command: ["python", "-m", "app.reflector"]
    environment:
      POSTGRES_DSN: postgresql+asyncpg://wave:wave@postgres:5432/wave
      REDIS_URL: redis://redis:6379/0
      # LLM: read from the project .env (no key -> mock client).
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MODEL_PREMIUM: ${MODEL_PREMIUM:-gpt-4o}
      MODEL_STANDARD: ${MODEL_STANDARD:-gpt-4o-mini}
      MODEL_FAST: ${MODEL_FAST:-gpt-4o-mini}
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      migrate: {condition: service_completed_successfully}

volumes:
  wave_pg:
