services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wave
      POSTGRES_PASSWORD: wave
      POSTGRES_DB: wave
    ports:
      - "5432:5432"
    volumes:
      - wave_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wave"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  wave_pg:
